<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Dice Royale | Probá tu suerte!</title>
  <link href="css/styles.css" rel="stylesheet">
</head>

<body>

  <header class="header">
    <h1 class="header-title">DICE ROYALE</h1>
    <p class="header-subtitle">SIMULADOR DE DADOS CON ESTADÍSTICAS EN TIEMPO REAL</p>
  </header>

  <main class="main-container">

    <section id="dice-container" class="dice-container">
      <div class="dices">
        <div class="dice">
          <img id="first-dice" class="dice-img" src="assets/img/dice-1.svg" alt="Number 1 dice">
        </div>
        <div class="dice">
          <img id="second-dice" class="dice-img" src="assets/img/dice-1.svg" alt="Number 2 dice">
        </div>
      </div>

      <div class="dice-sum">
        <h3 class="dice-sum-title">Suma actual</h3>
        <p id="sum" class="dice-sum-value">2</p>
      </div>

      <div class="btn-container">
        <button class="btn-roll" onclick="roll()" id="btn-roll">
          <img src="assets/icon/icon-dice.svg" alt="Dados" class="btn-icon">
          <span>TIRAR</span>
        </button>

        <button class="btn-reset" onclick="reset()" id="btn-reset">
          <img src="assets/icon/icon-restart.svg" alt="Reset" class="btn-icon">
          <span>RESET</span>
        </button>
      </div>
    </section>

    <!-- INICIO de sección estadísticas -->
    <section id="stats-container" class="stats-container">
      <div>
        <h2 class="stats-title">ESTADÍSTICAS</h2>
        <p class="stats-total">Total de lanzamientos: <span id="rollCounter">0</span></p>
      </div>
      <!-- Refactorización: generamos la lista con renderStats.js -->
      <ol id="stats-list" class="stats-list"></ol>
    </section>
    <!-- FIN seccion estadisticas -->

  </main>

  <footer class="footer">
    <div class="footer-container">
      <div>
        <p class="footer-title">DICE ROYALE</p>
        <small class="footer-copy">&copy; 2026 | TUP UTN F.R.B.B</small>
      </div>

      <a href="https://github.com/naimneman99/dice-simulator" target="_blank" class="footer-git">
        <img src="./assets/icon/github-icon.svg" alt="Repositorio de GitHub" class="footer-git-icon">
      </a>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>

</html>
