<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Dice Simulator | Test your luck!</title>
    <link href="css/styles.css" rel="stylesheet">
  </head>

  <body>

    <header class="header">
      <h1 class="header-title">DICE ROYALE</h1>
      <p class="header-subtitle">SIMULADOR DE DADOS CON ESTADÍSTICAS EN TIEMPO REAL</p>
    </header>

    <main class="main-container">

      <section id="dice-container" class="dice-container">

        <div>
          <div class="dice">
            <img id="first-dice" class="dice-img" src="assets/img/dice-1.svg" alt="Number 1 dice">
          </div>
          <div class="dice">
            <img id="second-dice" class="dice-img" src="assets/img/dice-2.svg" alt="Number 2 dice">
          </div>
        </div>

        <div class="dice-sum">
          <h3>Current Sum</h3>
          <div id="sum">3</div>
        </div>
        
        <div class="btn-container">
          <button class="btn-roll" onclick="roll()">ROLL!</button>
          <button class="btn-reset" onclick="reset()">Reset</button>
        </div>

        <!-- INICIO seccion estadisticas -->

        <section id="stats-container" class="stats-container">

          <div id="stats-header">
            <h3>ESTADÍSTICAS</h3>
            <h4>ACTIVO</h4>
            <h4>Total de lanzamientos: <span id="counter">0</span> </h4>
          </div>

          <div id="stats-list">
            <span id="numero-dado">2</span>
            <span id="numero-dado">3</span>
            <span id="numero-dado">4</span>
            <span id="numero-dado">5</span>
            <span id="numero-dado">6</span>
            <span id="numero-dado">7</span>
            <span id="numero-dado">8</span>
            <span id="numero-dado">9</span>
            <span id="numero-dado">10</span>
            <span id="numero-dado">11</span>
            <span id="numero-dado">12</span>
          </div>


        </section>

        <!-- FIN seccion estadisticas -->



      </section>

      <section class="timeline-container" id="timeline-container">
        <h2 class="timeline-title">Timeline</h2>
        <div class="timeline-counter">
          <span id="counter">0</span>
        </div>
        <ul class="timeline-results" id="timeline">
          <li class="timeline-result">
            <span>2</span>
            <div class="barra-result"></div>
          </li>
          <li class="timeline-result">
            <span>3</span>
            <div class="barra-result"></div>
          </li>
          <li class="timeline-result">
            <span>4</span>
            <div class="barra-result"></div>
          </li>
          <li class="timeline-result">
            <span>5</span>
            <div class="barra-result"></div>
          </li>
          <li class="timeline-result">
            <span>6</span>
            <div class="barra-result"></div>
          </li>
          <li class="timeline-result">
            <span>7</span>
            <div class="barra-result"></div>
          </li>
          <li class="timeline-result">
            <span>8</span>
            <div class="barra-result"></div>
          </li>
          <li class="timeline-result">
            <span>9</span>
            <div class="barra-result"></div>
          </li>
          <li class="timeline-result">
            <span>10</span>
            <div class="barra-result"></div>
          </li>
          <li class="timeline-result">
            <span>11</span>
            <div class="barra-result"></div>
          </li>
          <li class="timeline-result">
            <span>12</span>
            <div class="barra-result"></div>
          </li>
        </ul>
      </section>

    <script src="js/script.js"></script>
  </body>

</html>
